services:
  localstack:
    image: localstack/localstack:3
    container_name: localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=iam,cloudtrail,events
      - DEBUG=0
    volumes:
      - /tmp/localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
